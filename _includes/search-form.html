  <input type="search" name="q" id="s" placeholder="Search..." data-placeholder="Type then hit Enter..." value="{{ page.search_query | default: '' }}">
  <i class="fa-solid fa-magnifying-glass"></i>
  <input type="submit" id="searchsubmit" value="st">
</form>
