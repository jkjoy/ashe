# Ashe 主题主设置文件。
# 这里只保留 Jekyll 静态站里能够稳定实现的设置项。

skins:
  # 可选值：default / dark / box
  select: default
  # 是否显示导航栏里的暗色模式切换按钮。
  dark_mode_switcher: true

colors:
  # 站点强调色。
  content_accent: "#ca9b52"
  # 内容区域背景色。
  content_bg: "#ffffff"
  # 页头背景色。
  header_bg: "#ffffff"

general:
  # 左右侧栏的基础宽度，单位 px。
  sidebar_width: 270
  # 是否启用左右侧栏吸顶。
  sidebar_sticky: true
  # 首页文章布局：col1-rsidebar（卡片） / list-rsidebar（列表）
  home_layout: col1-rsidebar
  # 页头宽度：contained（内层居中） / boxed（外层包裹）
  header_width: contained
  # 首页轮播宽度。
  slider_width: boxed
  # 首页特色链接宽度。
  links_width: boxed
  # 常规内容宽度。
  content_width: boxed
  # 单篇文章宽度。
  single_width: boxed
  # 页脚宽度。
  footer_width: contained

top_bar:
  # 是否显示顶部栏。
  enabled: false
  # 是否在顶部栏显示社交图标。
  show_socials: false

header_image:
  # 是否显示页头大图区域。
  enabled: true
  # 页头背景图。
  image: /assets/images/ashe_bg.jpg
  # 背景图缩放方式：cover / contain
  bg_image_size: cover

site_identity:
  # 主 Logo，留空时显示站点标题文字。
  logo: ""
  # 主 Logo 最大宽度，单位 px。
  logo_width: 500
  # 是否显示站点标题与副标题。
  show_text: true
  # 使用图片 Logo 时，是否额外输出一个隐藏的 SEO 标题。
  seo_hidden_title: false

navigation:
  # 是否显示主导航。
  enabled: true
  # 主导航对齐方式：left / center / right
  align: center
  # 是否显示搜索图标。
  show_search: true
  # 是否显示左侧抽屉侧栏按钮。
  show_sidebar: true
  # 移动端是否把顶部菜单合并进主菜单。
  merge_mobile_menu: false
  # 是否启用简洁头部（高度 70px）。
  simple_header: false
  # 导航栏迷你 Logo，留空则不显示。
  mini_logo: ""
  # 导航栏迷你 Logo 最大宽度，单位 px。
  mini_logo_width: 70

featured_slider:
  # 是否启用首页轮播。
  enabled: true
  # 显示位置：both / front / blog
  location: both
  # 数据来源：posts / custom
  source: posts
  # 文章来源时的筛选方式：all / category
  display: all
  # 文章来源时的分类名；display 为 category 时生效。
  category: ""
  # 轮播条目数量。
  amount: 3
  # 是否只显示带封面图的文章。
  exclude_without_image: false
  # 是否显示左右切换箭头。
  navigation: true
  # 是否显示底部圆点。
  pagination: true
  # 自定义轮播条目，仅在 source 为 custom 时生效。
  custom_items:
    - image: /assets/images/image_5.jpg
      title: 让想法持续流动的清晨仪式
      text: 小习惯、慢节奏和安静的注意力，会把写作带入更稳定的状态。
      link: /札记/生活/morning-rituals/
      button_text: 继续阅读
      new_tab: false
    - image: /assets/images/image_3.jpg
      title: 周末市集札记
      text: 纹理、气味和颜色，会把一次普通采购变成值得收藏的视觉日记。
      link: /生活/美食/weekend-market-notes/
      button_text: 继续阅读
      new_tab: false
    - image: /assets/images/image_6.jpg
      title: 一条适合慢旅行的海岸线
      text: 旅行里最好的部分，常常藏在两个目的地之间的停顿里。
      link: /旅行/札记/a-coastal-route-for-slow-travel/
      button_text: 继续阅读
      new_tab: false

featured_links:
  # 是否启用首页三栏特色链接。
  enabled: false
  # 显示位置：both / front / blog
  location: both
  # 最多支持三项，和原主题保持一致。
  items:
    - title: 生活
      url: /archive/?category=生活
      image: /assets/images/lifestyle.jpg
    - title: 美食
      url: /archive/?category=美食
      image: /assets/images/food.jpg
    - title: 旅行
      url: /archive/?category=旅行
      image: /assets/images/img8.jpg

blog_page:
  # 首页摘要模式：excerpt / content / none
  post_description: excerpt
  # 分页样式：default / numeric
  pagination: numeric
  # 是否显示分类。
  show_categories: true
  # 是否显示日期。
  show_date: true
  # 是否启用首字下沉。
  show_dropcaps: false
  # 是否显示作者。
  show_author: false
  # 是否在文章列表卡片下显示“你可能也会喜欢”。
  show_related_posts: false
  # 以下为分享按钮开关。
  show_share_facebook: false
  show_share_twitter: false
  show_share_pinterest: false
  show_share_whatsapp: false
  show_share_linkedin: false
  show_share_reddit: false
  show_share_tumblr: false
  # 相关文章排序：related / latest / none
  related_orderby: related

single_page:
  # 是否显示文章封面图。
  show_featured_image: true
  # 是否显示分类。
  show_categories: true
  # 是否显示日期。
  show_date: true
  # 是否显示作者。
  show_author: false
  # 是否显示作者简介块。
  show_author_desc: false
  # 是否显示文章页左右侧上一篇/下一篇浮动导航。
  show_navigation: true
  # 文章页上一篇/下一篇导航样式：original（原样侧边预览） / compact（缩小侧边预览） / text（底部文字导航）
  navigation_style: text
  # 是否显示文章页“你可能也会喜欢”。
  show_related_posts: true
  # 相关文章排序：related / latest / none
  related_orderby: related

comments:
  # 全局评论开关；单篇文章可在 front matter 中设置 comments: false 关闭。
  enabled: true
  # 可选值：twikoo / gitalk / artalk / external
  provider: twikoo
  # 是否也在普通页面启用评论；默认只在文章页启用。
  show_on_pages: false
  # 评论区标题。
  title: 评论
  # 文章唯一键，默认使用 page.url；单篇文章可用 comment_key 覆盖。
  twikoo:
    # 腾讯云环境填 envId；Vercel 或自部署填服务地址。
    env_id: "https://t.ittst.com"
    # 腾讯云环境地域，非腾讯云可留空。
    region: ""
    lang: zh-CN
    js: "https://cdn.jsdelivr.net/npm/twikoo@1/dist/twikoo.all.min.js"
  gitalk:
    client_id: ""
    client_secret: ""
    repo: ""
    owner: ""
    # 有仓库写权限、可初始化 issue 的 GitHub 用户名列表。
    admin: []
    labels: [Gitalk]
    language: zh-CN
    # Gitalk 的 id 长度必须小于 50；必要时请在文章 front matter 设置 comment_key。
    id: ""
    per_page: 10
    pager_direction: last
    create_issue_manually: false
    distraction_free_mode: false
    enable_hot_key: true
    proxy: ""
    css: "https://cdn.jsdelivr.net/npm/gitalk@1/dist/gitalk.css"
    js: "https://cdn.jsdelivr.net/npm/gitalk@1/dist/gitalk.min.js"
  artalk:
    server: ""
    site: Ashe
    locale: zh-CN
    page_key: ""
    page_title: ""
    placeholder: ""
    no_comment: ""
    css: "https://cdn.jsdelivr.net/npm/artalk@2/dist/Artalk.css"
    js: "https://cdn.jsdelivr.net/npm/artalk@2/dist/Artalk.js"
  external:
    # 兼容旧的外部讨论链接；也可继续在单篇文章设置 comments_url。
    url: ""

albums:
  # Lightbox2 资源，仅相册详情页加载。
  lightbox_css: "https://cdn.staticfile.org/lightbox2/2.11.3/css/lightbox.min.css"
  lightbox_js: "https://cdn.staticfile.org/lightbox2/2.11.3/js/lightbox-plus-jquery.min.js"
  # 相册列表每页最多显示数量；留空或 0 表示显示全部。
  index_limit: 0

social_media:
  # 社交链接是否在新标签页打开。
  open_in_new_tab: true
  # url 留空则不显示；title 用于悬停提示与无障碍标签。
  # 微信可填二维码图片页或自定义介绍页；QQ 可填 tencent://message 等可用链接。
  items:
    - icon: facebook
      title: Facebook
      url: ""
    - icon: x-twitter
      title: X
      url: ""
    - icon: instagram
      title: Instagram
      url: ""
    - icon: pinterest
      title: Pinterest
      url: ""
    - icon: weixin
      title: 微信
      url: ""
    - icon: weibo
      title: 微博
      url: ""
    - icon: mastodon
      title: Mastodon
      url: "https://zxd.im/@sun"
      rel: me
    - icon: qq
      title: QQ
      url: ""
    - icon: telegram
      title: Telegram
      url: ""
    - icon: rss
      title: RSS 订阅
      url: /feed.xml

typography:
  # Logo 字体，可直接填写 Google Fonts 的字体名。
  logo_family: Open Sans
  # 导航字体。
  nav_family: Open Sans
  # 导航是否斜体。
  nav_italic: false
  # 导航是否大写。
  nav_uppercase: true

footer:
  # 支持 $year 与 $copy 两个占位符。
  copyright: "$copy $year Ashe 主题"
  # 是否显示返回顶部按钮。
  show_scrolltop: true
  # 页脚右下角信用信息，支持 HTML。
  credit: 'Ashe 主题由 <a href="https://wp-royal-themes.com/">WP Royal.</a> 提供'

preloader:
  # 是否启用页面预加载动画。
  enabled: false

responsive:
  # 移动端是否显示首页轮播。
  featured_slider: true
  # 移动端是否显示特色链接。
  featured_links: false
  # 移动端是否显示相关文章。
  related_posts: false
  # 移动端菜单按钮样式：chevron-down / text
  menu_icon: chevron-down
  # 当 menu_icon 为 text 时显示的文字。
  mobile_icon_text: 菜单

