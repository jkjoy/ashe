# 侧栏与页脚小组件配置。
# type 字段决定组件渲染方式；未实现的 WordPress 专属小组件没有迁移。

sidebar_left: []

sidebar_right:
  - type: search
    title: 搜索
  - type: about
    title: 关于我
    image: /assets/images/img2.jpg
    text: >-
      这里记录旅行、餐桌、工作节奏，以及让普通日子变得值得记住的细小片段。
  - type: recent_posts
    title: 最新文章
    limit: 4
  - type: categories
    title: 分类
  - type: tags
    title: 标签

sidebar_alt:
  - type: text
    title: 欢迎
    content: >-
      这个侧边抽屉替代原 WordPress 主题里的备用侧栏，可放简介、链接或其他简短内容。
  - type: social
    title: 关注我
  - type: recent_posts
    title: 最新笔记
    limit: 3

footer:
  - type: text
    title: 关于 Ashe
    content: >-
      这是 Ashe 主题的 Jekyll 移植版，保留原有展示风格，并把可管理设置放入静态数据文件。
  - type: recent_posts
    title: 最新文章
    limit: 3
  - type: links
    title: 快捷链接
    items:
      - title: 搜索
        url: /search/
      - title: 归档
        url: /archive/
      - title: 关于
        url: /about/

